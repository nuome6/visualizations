name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build seq-list
        working-directory: ./seq-list
        run: |
          npm install
          npm run build
      - name: Prepare dist
        run: |
          mkdir -p _site/seq-list
          cp -r seq-list/dist/* _site/seq-list/
      - name: Create index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><title>可视化工具集</title></head>
          <body style="font-family:sans-serif;padding:40px;max-width:800px;margin:0 auto">
          <h1>可视化工具集</h1>
          <ul style="font-size:18px;line-height:2">
            <li><a href="/seq-list/">顺序表可视化</a></li>
          </ul>
          </body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
